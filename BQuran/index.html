<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Baitul Quran International Madrasha — Home</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/main.js" defer></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="brand">
      <img id="logo" src="assets/logo.png" alt="Baitul Quran logo" />
      <div class="brand-text">
        <strong id="site-title">Baitul Quran International Madrasha</strong>
        <small id="site-subtitle">Center for Quran Memorization and Ethical Stewardship</small>
      </div>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <ul id="nav"></ul>
    </nav>

    <div class="controls">
      <div class="lang-switch" role="tablist" aria-label="Language switch">
        <button id="lang-en" class="lang-btn" aria-pressed="true">EN</button>
        <button id="lang-bn" class="lang-btn">BN</button>
        <button id="lang-ar" class="lang-btn">AR</button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section id="hero" class="hero">
    <h1 id="hero-heading"></h1>
    <p id="hero-lead"></p>
  </section>

  <!-- Main layout: groups list + right-side panel -->
  <main class="layout" id="main">
    <section id="groups-section" class="panel">
      <header class="panel-header">
        <h2 id="groups-title">Groups</h2>
        <p class="panel-sub">Click a group to view details</p>
      </header>

      <div id="groups-list" class="cards" aria-live="polite"></div>
    </section>

    <aside id="group-panel" class="group-panel hidden" aria-hidden="true" aria-labelledby="group-panel-title">
      <button id="close-panel" class="close-btn" aria-label="Close group panel">×</button>
      <div id="group-panel-content" class="panel-content">
        <!-- Filled dynamically -->
      </div>
    </aside>
  </main>

  <!-- Departments (summary) -->
  <section id="departments" class="panel">
    <header class="panel-header">
      <h2 id="departments-title">Departments</h2>
    </header>
    <div id="department-cards" class="cards"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p id="footer-text"></p>
  </footer>
</body>
</html>
